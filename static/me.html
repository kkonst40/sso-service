<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Проверка статуса /me</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 300px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            color: white;
        }

        .btn-check {
            background-color: #28a745;
        }

        .btn-check:hover {
            background-color: #218838;
        }

        .btn-logout {
            background-color: #dc3545;
        }

        .btn-logout:hover {
            background-color: #c82333;
        }

        #statusDisplay {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        #statusText {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Управление сессией</h2>

        <div class="button-group">
            <button class="btn-check" onclick="checkStatus()">Проверить статус</button>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>

        <div id="statusDisplay">
            Статус: <span id="statusCode">---</span>
        </div>
        <p id="statusText"></p>
    </div>

    <script>
        const codeSpan = document.getElementById('statusCode');
        const textP = document.getElementById('statusText');

        function resetDisplay() {
            codeSpan.textContent = 'Ожидание...';
            codeSpan.style.color = 'black';
            textP.textContent = '';
        }

        async function checkStatus() {
            resetDisplay();
            try {
                const response = await fetch('api/me', {
                    method: 'GET',
                    credentials: 'include'
                });

                codeSpan.textContent = response.status;
                textP.textContent = `Результат: ${response.statusText}`;
                codeSpan.style.color = response.ok ? '#28a745' : '#dc3545';

            } catch (error) {
                codeSpan.textContent = 'Ошибка';
                codeSpan.style.color = '#dc3545';
                textP.textContent = 'Не удалось связаться с сервером';
            }
        }

        async function logout() {
            if (!confirm('Вы уверены, что хотите выйти?')) return;

            resetDisplay();
            try {
                const response = await fetch('api/logout', {
                    method: 'POST',
                    headers: {
                        'X-Device-Id': getDeviceId(),
                    },
                    credentials: 'include'
                });

                codeSpan.textContent = response.status;

                if (response.ok) {
                    textP.textContent = 'Вы успешно вышли из системы';
                    codeSpan.style.color = '#28a745';
                } else {
                    textP.textContent = `Ошибка при выходе: ${response.statusText}`;
                    codeSpan.style.color = '#dc3545';
                }

            } catch (error) {
                codeSpan.textContent = 'Ошибка';
                codeSpan.style.color = '#dc3545';
                textP.textContent = 'Сетевая ошибка при попытке выхода';
            }
        }

        function getDeviceId() {
            const STORAGE_KEY = 'device_id';

            return localStorage.getItem(STORAGE_KEY);
        }
    </script>

</body>

</html>
